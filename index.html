<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kaffon-hub</title>
    <link rel="icon" type="image/svg+xml" href="assets/2024_Logo_mainK.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { max-width: 640px; width: 100%; }
        .hero {
            text-align: center;
            margin-bottom: 48px;
        }
        .hero .logo {
            display: inline-block;
            width: 72px;
            height: 72px;
            margin-bottom: 20px;
        }
        .hero .logo img {
            width: 100%;
            height: 100%;
            filter: invert(1);
        }
        .hero h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .hero p {
            font-size: 15px;
            color: #64748b;
        }
        .links { list-style: none; display: flex; flex-direction: column; gap: 14px; }
        .links a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 22px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }
        .links a:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(59,130,246,0.4);
            box-shadow: 0 4px 24px rgba(59,130,246,0.1);
            transform: translateY(-2px);
        }
        .link-icon {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 20px;
        }
        .link-icon.blue { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .link-text { flex: 1; }
        .link-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .link-desc {
            font-size: 13px;
            color: #64748b;
            line-height: 1.4;
        }
        .link-meta {
            display: flex;
            gap: 16px;
            margin-top: 6px;
            font-size: 11px;
            color: #475569;
        }
        .link-meta span::before {
            margin-right: 4px;
        }
        .link-arrow {
            flex-shrink: 0;
            font-size: 18px;
            color: #475569;
            transition: transform 0.2s, color 0.2s;
        }
        .links a:hover .link-arrow {
            transform: translateX(4px);
            color: #3b82f6;
        }
        .footer {
            text-align: center;
            margin-top: 48px;
            font-size: 12px;
            color: #334155;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <div class="logo"><img src="assets/2024_Logo_mainK.svg" alt="kaffon Logo"></div>
            <h1>kaffon-hub</h1>
            <p>Statische HTML-Tools</p>
        </div>
        <ul class="links">
            <li>
                <a href="EBD_Interaktiv.html" target="_blank" rel="noopener">
                    <div class="link-icon blue">&#9670;</div>
                    <div class="link-text">
                        <div class="link-title">EBD Interaktiv</div>
                        <div class="link-desc">Entscheidungsbaumdiagramme der MaKo durchsuchen und filtern</div>
                        <div class="link-meta">
                            <span>Hinzugef&uuml;gt: 09.04.2026</span>
                            <span>Aktualisiert: 09.04.2026</span>
                        </div>
                    </div>
                    <div class="link-arrow">&#8594;</div>
                </a>
            </li>
        </ul>
        <div class="footer">Leon Kasdorf &middot; 2026</div>
    </div>
</body>
</html>
